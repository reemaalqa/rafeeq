name: rafeeq
description: AI voice assistant for elderly users with health management and Islamic features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1

  # Dependency Injection
  get_it: ^7.6.0
  injectable: ^2.3.0

  # Network
  dio: ^5.3.3
  connectivity_plus: ^5.0.1
  pretty_dio_logger: ^1.3.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Voice & Audio
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  permission_handler: ^11.3.0
  just_audio: ^0.9.36
  path_provider: ^2.1.0

  # Prayer Times
  adhan: ^2.0.0

  # Location
  geolocator: ^10.1.0
  flutter_map: ^6.1.0        # OpenStreetMap — free, no API key
  latlong2: ^0.9.1           # Coordinate type for flutter_map
  geocoding: ^2.1.1

  # UI Components
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  animations: ^2.0.11
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  google_fonts: ^6.1.0       # Cairo (UI) + Amiri (Quran) without shipping ttfs

  # Utilities
  intl: ^0.20.2
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.0.2
  uuid: ^4.2.1

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.6
  firebase_analytics: ^10.7.4

  # Other
  url_launcher: ^6.2.2
  android_intent_plus: ^6.0.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.0
  hive_generator: ^2.0.1

  # Testing
  mockito: ^5.4.3
  bloc_test: ^9.1.5

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/data/

  # UI font (Cairo) and Quran font (Amiri) are loaded at runtime via the
  # google_fonts package — no bundled ttf files required. The assets/fonts
  # directory is retained for any future offline font drops.
